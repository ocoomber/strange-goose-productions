name: Supabase keep-alive

# Free-tier Supabase pauses a project after 7 days with zero API requests.
# This pings the project's REST API on a schedule so the client portal never
# auto-pauses. Every 3 days leaves margin: even if two scheduled runs are
# skipped (GitHub cron is delayed/dropped under load) we stay under 7 days.

on:
  schedule:
    # 09:00 UTC on days 1,4,7,...,31 of the month — max gap ~3 days.
    - cron: '0 9 */3 * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          # Public by design (same key shipped in site/portal.js; RLS is the
          # real boundary). Safe to keep in the repo.
          SUPABASE_URL: https://zawrkuclsdqtvftfothj.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_-YJbebdIzYbf3JzzbriBGA_VWdiUarh
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1")
          echo "HTTP ${code}"
          # RLS may return an empty set, but the request still counts as
          # activity. Treat any 2xx as success.
          case "$code" in
            2*) echo "Keep-alive OK"; exit 0 ;;
            *)  echo "Unexpected status ${code}"; exit 1 ;;
          esac
