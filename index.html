<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strange Goose Productions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;1,300&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a09;
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.3);
    --white: #f0ede6;
    --muted: rgba(240,237,230,0.45);
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.3s;
  }

  .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .divider {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold-dim), transparent);
  }

  h1 {
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 8vw, 5.5rem);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--white);
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    line-height: 1.7;
  }

  .email {
    font-family: 'Cormorant', serif;
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--white);
    text-decoration: none;
    border-bottom: 1px solid var(--gold-dim);
    padding-bottom: 4px;
    transition: color 0.3s, border-color 0.3s;
  }

  .email:hover { color: var(--gold); border-color: var(--gold); }

  .location {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.18);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Edinburgh, Scotland</p>
    <h1>Strange Goose <em>Productions</em></h1>
    <p class="tagline">Short film. Music video. Brand commercial.<br>Award-winning, whatever the deadline.</p>
    <div class="divider"></div>
    <a href="mailto:info@strangegoose.co.uk" class="email">info@strangegoose.co.uk</a>
    <p class="location">Proper film. Built differently.</p>
  </div>
</body>
</html>
