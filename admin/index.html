<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Strange Goose Productions</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../site/styles.css">
<link rel="stylesheet" href="../site/portal.css">
</head>
<body>

<nav class="top">
  <a href="../index.html" class="brand"><span class="goose-glyph"></span><span class="brand-word">Strange Goose Productions</span></a>
  <div class="links">
    <span class="eyebrow" style="margin:0;">Admin</span>
  </div>
  <a href="#" class="cta" id="nav-signout" hidden><span class="cta-text">Sign out</span></a>
</nav>

<main class="portal-main">
  <div class="wrap-tight">

    <!-- login -->
    <section id="view-login" hidden>
      <div class="auth-card">
        <p class="eyebrow">Admin</p>
        <h2 style="margin-top:14px;">Sign in</h2>
        <p class="hint">Admin access only.</p>
        <form id="login-form">
          <div class="field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" autocomplete="current-password" required>
          </div>
          <p class="form-error" id="login-error" hidden></p>
          <button class="btn primary full" type="submit" style="margin-top:18px;">Sign in</button>
        </form>
      </div>
    </section>

    <!-- project list -->
    <section id="view-projects" hidden>
      <header class="portal-hd">
        <p class="eyebrow">Admin</p>
        <h1>Projects</h1>
        <p class="sub">Client accounts are created in the Supabase dashboard (Authentication → Add user). New accounts appear in the client dropdown below.</p>
      </header>

      <div class="admin-panel">
        <h2>New project</h2>
        <form id="create-form" class="admin-row">
          <div class="field">
            <label for="new-title">Project title</label>
            <input id="new-title" type="text" required>
          </div>
          <div class="field">
            <label for="new-client">Client account</label>
            <select id="new-client" required></select>
          </div>
          <button class="btn primary" type="submit">Create project</button>
        </form>
        <p class="form-error" id="create-error" hidden></p>
      </div>

      <div class="portal-grid" id="project-list" style="margin-top:32px;"></div>
      <p class="portal-empty" id="projects-empty" hidden>No projects yet.</p>
    </section>

    <!-- single project -->
    <section id="view-project" hidden>
      <header class="portal-hd">
        <a class="back-link" href="#">← All projects</a>
        <h1 id="project-title" style="margin-top:18px;"></h1>
        <p class="sub" id="project-meta"></p>
        <p style="margin-top:16px;">
          <button class="btn ghost" type="button" id="undo-approval" hidden>Undo last approval</button>
          <button class="btn ghost" type="button" id="reset-project" style="margin-left:10px;">Reset project (testing)</button>
        </p>
        <p class="form-error" id="project-error" hidden></p>
      </header>
      <div class="stage-list" id="stage-list"></div>
      <div id="complete-zone" style="margin-top:24px;"></div>
    </section>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../site/portal.js"></script>
<script>
(function () {
  var views = ['login', 'projects', 'project'];
  var profile = null;

  function show(name) {
    views.forEach(function (v) {
      document.getElementById('view-' + v).hidden = (v !== name);
    });
    document.getElementById('nav-signout').hidden = (name === 'login');
  }

  document.getElementById('nav-signout').addEventListener('click', function (e) {
    e.preventDefault();
    signOut();
  });

  /* ── login ── */
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    var errNode = document.getElementById('login-error');
    errNode.hidden = true;
    try {
      await signIn(
        document.getElementById('login-email').value.trim(),
        document.getElementById('login-password').value
      );
      profile = await getProfile();
      if (!profile || profile.role !== 'admin') {
        await sb.auth.signOut();
        profile = null;
        throw { message: 'This account does not have admin access.' };
      }
      route();
    } catch (err) { showError(errNode, err); }
  });

  /* ── project list ── */
  async function renderProjects() {
    var clients = await sb.from('profiles')
      .select('id, email, display_name').eq('role', 'client').order('email');
    var sel = document.getElementById('new-client');
    sel.innerHTML = '';
    (clients.data || []).forEach(function (c) {
      var opt = el('option', null, (c.display_name || c.email) + ' — ' + c.email);
      opt.value = c.id;
      sel.appendChild(opt);
    });

    var res = await sb.from('projects')
      .select('id, title, status, created_at, client_id, profiles(email, display_name), stages(state)')
      .order('created_at', { ascending: false });
    var list = document.getElementById('project-list');
    list.innerHTML = '';
    var projects = res.data || [];
    document.getElementById('projects-empty').hidden = projects.length > 0;
    projects.forEach(function (p) {
      var stages = p.stages || [];
      var approved = stages.filter(function (s) { return s.state === 'approved'; }).length;
      var pending = stages.filter(function (s) { return s.state === 'pending'; }).length;
      var card = el('a', 'project-card');
      card.href = '#project/' + p.id;
      card.appendChild(el('h3', null, p.title));
      var meta = el('div', 'meta');
      meta.appendChild(el('span', 'badge ' + p.status, p.status === 'complete' ? 'Complete' : 'Active'));
      meta.appendChild(el('span', null, 'Client: ' + ((p.profiles && p.profiles.email) || '—')));
      meta.appendChild(el('span', null, approved + '/' + (STAGE_COUNT - 1) + ' approved' +
        (pending ? ' · awaiting client approval' : '')));
      card.appendChild(meta);
      list.appendChild(card);
    });
    show('projects');
  }

  document.getElementById('create-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    var errNode = document.getElementById('create-error');
    errNode.hidden = true;
    var res = await sb.from('projects').insert({
      title: document.getElementById('new-title').value.trim(),
      client_id: document.getElementById('new-client').value
    });
    if (res.error) { showError(errNode, res.error); return; }
    document.getElementById('new-title').value = '';
    renderProjects();
  });

  /* ── single project ── */
  function linkEditor(stage, field, projectId, heading) {
    var box = el('div');
    box.appendChild(el('p', 'eyebrow', heading));
    var links = stage[field] || [];
    var errNode = el('p', 'form-error');
    errNode.hidden = true;

    async function save(newLinks) {
      var patch = {};
      patch[field] = newLinks;
      var res = await sb.from('stages').update(patch).eq('id', stage.id);
      if (res.error) showError(errNode, res.error); else renderProject(projectId);
    }

    var ul = el('ul', 'portal-links');
    links.forEach(function (l, i) {
      var li = el('li');
      var a = el('a', null, (l.label || l.url));
      a.href = l.url; a.target = '_blank'; a.rel = 'noopener';
      li.appendChild(a);
      var rm = el('button', 'btn ghost', 'Remove');
      rm.type = 'button';
      rm.style.cssText = 'margin-left:12px;padding:3px 10px;font-size:10px;';
      rm.addEventListener('click', function () {
        save(links.filter(function (_, j) { return j !== i; }));
      });
      li.appendChild(rm);
      ul.appendChild(li);
    });
    box.appendChild(ul);

    var form = el('form', 'inline-form');
    var label = el('input'); label.placeholder = 'Label'; label.type = 'text';
    var url = el('input'); url.placeholder = 'https://drive.google.com/…'; url.type = 'url'; url.required = true;
    var add = el('button', 'btn ghost', 'Add link'); add.type = 'submit';
    form.appendChild(label); form.appendChild(url); form.appendChild(add);
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      save(links.concat([{ label: label.value.trim() || url.value.trim(), url: url.value.trim() }]));
    });
    box.appendChild(form);
    box.appendChild(errNode);
    return box;
  }

  async function renderProject(id) {
    var pr = await sb.from('projects')
      .select('*, profiles(email, display_name)').eq('id', id).single();
    if (pr.error || !pr.data) { location.hash = ''; return; }
    var project = pr.data;
    var st = await sb.from('stages').select('*').eq('project_id', id).order('stage_index');
    var ap = await sb.from('approvals').select('*').eq('project_id', id);
    var approvals = {};
    (ap.data || []).forEach(function (a) { approvals[a.stage_id] = a; });
    var stages = st.data || [];
    var projErr = document.getElementById('project-error');
    projErr.hidden = true;

    document.getElementById('project-title').textContent = project.title;
    document.getElementById('project-meta').textContent =
      'Client: ' + ((project.profiles && project.profiles.email) || '—') +
      ' · Created ' + fmtDate(project.created_at);

    var hasApproved = stages.some(function (s) { return s.state === 'approved'; });
    var undo = document.getElementById('undo-approval');
    undo.hidden = !hasApproved;
    undo.onclick = async function () {
      var last = stages.filter(function (s) { return s.state === 'approved'; }).pop();
      if (!window.confirm('Undo the most recent approval ("' + (last ? last.name : '') + '")?\n\n' +
        'This reverts that stage to awaiting approval — use it to correct an accidental approval. ' +
        'Earlier approvals are kept.')) return;
      var res = await sb.rpc('revert_last_approval', { p_project: id });
      if (res.error) showError(projErr, res.error); else renderProject(id);
    };

    var reset = document.getElementById('reset-project');
    reset.onclick = async function () {
      if (!window.confirm('Reset "' + project.title + '"?\n\nThis permanently deletes all approval ' +
        'records for this project and relocks every stage (links and videos are kept). For testing only.')) return;
      var res = await sb.rpc('reset_project', { p_project: id });
      if (res.error) showError(projErr, res.error); else renderProject(id);
    };

    var list = document.getElementById('stage-list');
    list.innerHTML = '';
    // The stage we're actively on: the one awaiting the client, otherwise the
    // next one ready to submit. That's expanded by default; the rest collapse.
    var pendingStage = stages.find(function (s) { return s.state === 'pending'; });
    var nextToSubmit = null;
    var fl0 = stages.find(function (s) { return s.state === 'locked'; });
    if (fl0 && (fl0.stage_index === 1 || (stages[fl0.stage_index - 2] || {}).state === 'approved')) {
      nextToSubmit = fl0;
    }
    var currentId = pendingStage ? pendingStage.id : (nextToSubmit ? nextToSubmit.id : null);
    stages.forEach(function (s, idx) {
      var card = el('div', 'stage collapsible ' + s.state);
      var top = el('div', 'stage-top');
      top.appendChild(el('span', 'stage-num', '0' + s.stage_index));
      top.appendChild(el('h3', null, s.name));
      var a = approvals[s.id];
      var act = STAGE_ACTIONS[s.stage_index];
      if (s.state === 'approved') {
        top.appendChild(el('span', 'badge approved', (act && act.done) || 'Done'));
        if (a) top.appendChild(el('span', 'stage-when', fmtDate(a.approved_at)));
      } else if (s.state === 'pending') {
        top.appendChild(el('span', 'badge pending',
          s.stage_index === 7 ? 'With client' : 'Awaiting client'));
      } else {
        top.appendChild(el('span', 'badge locked', 'Not yet submitted'));
      }
      card.appendChild(top);

      var collapse = el('div', 'stage-collapse');
      var tools = el('div', 'admin-tools');
      var frozen = (s.state === 'approved');  // content locked once client approves

      if (frozen) {
        tools.appendChild(el('p', 'hint',
          'Approved by the client — the content below is locked as the permanent record of what was approved.'));
        var docBox = el('div');
        docBox.appendChild(el('p', 'eyebrow', 'Document links (Google Drive)'));
        if ((s.doc_links || []).length) docBox.appendChild(linkList(s.doc_links));
        else docBox.appendChild(el('p', 'hint', 'None'));
        tools.appendChild(docBox);
        if (s.note) {
          var noteRO = el('div');
          noteRO.appendChild(el('p', 'eyebrow', 'Note to client'));
          noteRO.appendChild(el('p', 'stage-note', s.note));
          tools.appendChild(noteRO);
        }
      } else {
        tools.appendChild(linkEditor(s, 'doc_links', id, 'Document links (Google Drive)'));

        var noteBox = el('div');
        if (s.note) {
          var preview = el('div', 'stage-note-box');
          preview.appendChild(el('p', 'eyebrow', 'Note the client will see'));
          preview.appendChild(el('p', 'stage-note', s.note));
          noteBox.appendChild(preview);
        }
        noteBox.appendChild(el('p', 'eyebrow', s.note
          ? 'Edit note to client'
          : 'Note to client (e.g. what changed in response to feedback)'));
        var noteForm = el('form', 'note-form');
        var noteArea = el('textarea');
        noteArea.placeholder = 'e.g. As per your feedback, Scene 3 is now longer and Scene 5 uses more close-ups.';
        noteArea.value = s.note || '';
        var noteSave = el('button', 'btn ghost', s.note ? 'Update note' : 'Save note');
        noteSave.type = 'submit';
        var noteErr = el('p', 'form-error'); noteErr.hidden = true;
        noteForm.appendChild(noteArea);
        noteForm.appendChild(noteSave);
        noteForm.appendChild(noteErr);
        noteForm.addEventListener('submit', async function (e) {
          e.preventDefault();
          var res = await sb.from('stages')
            .update({ note: noteArea.value.trim() || null }).eq('id', s.id);
          if (res.error) showError(noteErr, res.error); else renderProject(id);
        });
        noteBox.appendChild(noteForm);
        tools.appendChild(noteBox);

        var vidBox = el('div');
        vidBox.appendChild(el('p', 'eyebrow', 'Video (paste YouTube link or ID)'));
        var vidForm = el('form', 'inline-form');
        var vidInput = el('input');
        vidInput.type = 'text';
        vidInput.placeholder = 'https://youtube.com/watch?v=… or video ID (blank to remove)';
        vidInput.value = s.video_id || '';
        var vidSave = el('button', 'btn ghost', 'Save video'); vidSave.type = 'submit';
        var vidErr = el('p', 'form-error'); vidErr.hidden = true;
        vidForm.appendChild(vidInput); vidForm.appendChild(vidSave);
        vidForm.addEventListener('submit', async function (e) {
          e.preventDefault();
          var res = await sb.from('stages')
            .update({ video_id: parseYouTubeId(vidInput.value) || null }).eq('id', s.id);
          if (res.error) showError(vidErr, res.error); else renderProject(id);
        });
        vidBox.appendChild(vidForm);
        vidBox.appendChild(vidErr);
        tools.appendChild(vidBox);
      }
      if (s.video_id) tools.appendChild(ytEmbed(s.video_id));

      if (s.stage_index === 7) {
        tools.appendChild(linkEditor(s, 'deliverable_links', id,
          'Deliverable download links (shown to client once project is marked complete)'));
      }

      // Advance button on the first locked stage, enabled when previous stage approved
      var firstLocked = stages.find(function (x) { return x.state === 'locked'; });
      if (firstLocked && firstLocked.id === s.id) {
        var prevApproved = idx === 0 || stages[idx - 1].state === 'approved';
        var advBox = el('div');
        var adv = el('button', 'btn primary', 'Submit to client');
        adv.type = 'button';
        adv.disabled = !prevApproved;
        var advErr = el('p', 'form-error'); advErr.hidden = true;
        if (!prevApproved) {
          advBox.appendChild(el('p', 'hint',
            'Available once the client completes "' + stages[idx - 1].name + '".'));
        }
        adv.addEventListener('click', async function () {
          var res = await sb.from('stages').update({ state: 'pending' }).eq('id', s.id);
          if (res.error) showError(advErr, res.error); else renderProject(id);
        });
        advBox.appendChild(adv);
        advBox.appendChild(advErr);
        tools.appendChild(advBox);
      }

      collapse.appendChild(tools);

      // Repeat the status at the foot of the block — you read down the page,
      // so each block should end with its outcome.
      if (s.state === 'approved') {
        var foot = el('div', 'stage-foot');
        foot.appendChild(el('span', 'badge approved', (act && act.done) || 'Done'));
        if (a) foot.appendChild(el('span', 'stage-when', fmtDate(a.approved_at)));
        collapse.appendChild(foot);
      }

      card.appendChild(collapse);

      // Collapse every stage except the one we're working on; click to toggle.
      if (s.id !== currentId) card.classList.add('collapsed');
      top.addEventListener('click', function () { card.classList.toggle('collapsed'); });

      list.appendChild(card);
    });

    // Release deliverables / close the project — at the end of the chain
    var zone = document.getElementById('complete-zone');
    zone.innerHTML = '';
    var panel = el('div', 'admin-panel');
    // Only reachable once the Deliverables stage itself has been submitted.
    var deliverablesStage = stages.find(function (s) { return s.stage_index === 7; });
    var deliverablesReached = deliverablesStage && deliverablesStage.state === 'pending';
    var hasDeliverableLinks = deliverablesStage && (deliverablesStage.deliverable_links || []).length > 0;
    if (project.status === 'complete') {
      panel.appendChild(el('h2', null, 'Project complete'));
      panel.appendChild(el('p', 'hint',
        'Deliverables are released — the client can download their files. Reopen only if you need to make changes.'));
      var reopen = el('button', 'btn ghost', 'Reopen project');
      reopen.type = 'button';
      reopen.onclick = async function () {
        var res = await sb.from('projects').update({ status: 'active' }).eq('id', id);
        if (res.error) showError(projErr, res.error); else renderProject(id);
      };
      panel.appendChild(reopen);
    } else {
      panel.appendChild(el('h2', null, 'Release deliverables'));
      panel.appendChild(el('p', 'hint',
        !deliverablesReached
          ? 'Available at the Deliverables stage — submit it to the client first (after they accept the final version).'
          : !hasDeliverableLinks
            ? 'Add the deliverable download links to the Deliverables stage above, then release them here once the money is in the bank.'
            : 'Once the money is in the bank, mark the project complete to release the deliverable download links to the client.'));
      var done = el('button', 'btn primary', 'Mark complete — release deliverables');
      done.type = 'button';
      done.disabled = !(deliverablesReached && hasDeliverableLinks);
      done.onclick = async function () {
        if (!window.confirm('Mark "' + project.title + '" complete and release the deliverables to the client?')) return;
        var res = await sb.from('projects').update({ status: 'complete' }).eq('id', id);
        if (res.error) showError(projErr, res.error); else renderProject(id);
      };
      panel.appendChild(done);
    }
    zone.appendChild(panel);

    show('project');
  }

  /* ── routing ── */
  async function route() {
    var session = await getSession();
    if (!session) { show('login'); return; }
    if (!profile) profile = await getProfile();
    if (!profile || profile.role !== 'admin') {
      await sb.auth.signOut();
      profile = null;
      show('login');
      return;
    }
    var m = location.hash.match(/^#project\/(.+)$/);
    if (m) renderProject(m[1]); else renderProjects();
  }

  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
